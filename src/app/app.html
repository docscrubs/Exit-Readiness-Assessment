<div class="min-h-screen flex flex-col bg-gradient-to-b from-slate-50 via-white to-slate-50 text-slate-800">
  <header class="sticky top-0 z-30 backdrop-blur supports-[backdrop-filter]:bg-white/70 bg-white/90 border-b border-slate-200">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a class="flex items-center gap-2 font-semibold text-slate-900" routerLink="/">
        <img *ngIf="brand() as b" [src]="b.logoUrl" [alt]="b.displayName + ' logo'" class="h-8 w-8 rounded-md object-contain bg-white" />
        <span>SME Exit Readiness Assessment</span>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm">
        <a class="hover:text-primary transition" routerLink="/">Home</a>
        <a class="hover:text-primary transition" routerLink="/assessment">Assessment</a>
      </nav>
      <a routerLink="/assessment" class="btn btn-primary hidden sm:inline-flex">Start assessment</a>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="border-t border-slate-200 bg-white/70">
    <div class="container mx-auto px-6 py-8 text-sm text-slate-500 flex flex-col sm:flex-row items-center justify-between gap-4">
      <p>© {{ currentYear }} <ng-container *ngIf="brand() as b">{{ b.displayName }} — </ng-container>SME Exit Readiness Assessment</p>
      <div class="flex items-center gap-4">
        <a class="hover:text-primary" routerLink="/">Home</a>
        <a class="hover:text-primary" routerLink="/assessment">Assessment</a>
      </div>
    </div>
  </footer>
</div>
